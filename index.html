<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Smart Wheelchair | Navigation Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============================================ -->
  <!-- SPLASH SCREEN                                 -->
  <!-- ============================================ -->
  <section id="splash-screen" class="screen">
    <div class="splash-content">
      <div class="splash-logo">
        <!-- Radar / wheelchair icon -->
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10" />
          <circle cx="12" cy="12" r="5.5" />
          <circle cx="12" cy="12" r="1.2" fill="currentColor" />
        </svg>
      </div>
      <h1 class="splash-title">SMART WHEELCHAIR</h1>
      <p class="splash-subtitle">Autonomous &amp; Mobile-Controlled Navigation System</p>
      <p class="splash-meta">LEGO EV3 &middot; Pybricks &middot; Paterson High School</p>
      <div class="splash-loader" id="splash-loader">
        <div class="splash-loader-bar"></div>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- MAIN APP (hidden until splash finishes)       -->
  <!-- ============================================ -->
  <main id="app" class="screen hidden">

    <!-- ---------- TOP BAR: Connection ---------- -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-name">SMART WHEELCHAIR</span>
        <span class="brand-tag">Nav Console</span>
      </div>

      <button id="connect-btn" class="connect-btn" data-state="disconnected">
        <span class="connect-dot"></span>
        <span class="connect-label">Connect</span>
      </button>
    </header>

    <!-- ---------- STATUS STRIP ---------- -->
    <section class="status-strip" aria-label="Robot status indicators">

      <div class="status-card" id="status-connection">
        <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M5 12.55a11 11 0 0 1 14.08 0" />
          <path d="M8.5 16.05a6 6 0 0 1 7 0" />
          <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none" />
        </svg>
        <span class="status-label">Link</span>
        <span class="status-value" id="connection-value">Offline</span>
      </div>

      <div class="status-card" id="status-battery">
        <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="7" width="17" height="10" rx="2" />
          <line x1="22" y1="10" x2="22" y2="14" />
          <rect x="4" y="9" width="0" height="6" fill="currentColor" id="battery-fill-rect" stroke="none" />
        </svg>
        <span class="status-label">Battery</span>
        <span class="status-value" id="battery-value">--%</span>
      </div>

      <div class="status-card" id="status-distance">
        <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M2 12h3M19 12h3M7 8v8M12 5v14M17 8v8" />
        </svg>
        <span class="status-label">Distance</span>
        <span class="status-value" id="distance-value">-- cm</span>
      </div>

      <div class="status-card" id="status-color">
        <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="9" />
          <circle cx="12" cy="12" r="3" fill="currentColor" id="color-dot" stroke="none" />
        </svg>
        <span class="status-label">Line Color</span>
        <span class="status-value" id="color-value">--</span>
      </div>

    </section>

    <!-- ---------- ROBOT STATUS BANNER ---------- -->
    <section class="robot-status-banner" id="robot-status-banner">
      <span class="pulse-dot"></span>
      <span id="robot-status-text">Standing by</span>
    </section>

    <!-- ---------- MODE SWITCH ---------- -->
    <section class="mode-switch" aria-label="Control mode">
      <button class="mode-btn active" data-mode="manual" id="mode-manual-btn">Manual</button>
      <button class="mode-btn" data-mode="autonomous" id="mode-autonomous-btn">Autonomous</button>
    </section>

    <!-- ---------- MANUAL CONTROL PANEL ---------- -->
    <section class="panel" id="manual-panel">
      <h2 class="panel-title">Directional Control</h2>

      <div class="dpad">
        <button class="dpad-btn dpad-up" id="btn-forward" aria-label="Forward">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7" /></svg>
        </button>
        <button class="dpad-btn dpad-left" id="btn-left" aria-label="Turn Left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>
        </button>
        <button class="dpad-btn dpad-center" id="btn-stop-small" aria-label="Stop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
        </button>
        <button class="dpad-btn dpad-right" id="btn-right" aria-label="Turn Right">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7" /></svg>
        </button>
        <button class="dpad-btn dpad-down" id="btn-backward" aria-label="Backward">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M19 12l-7 7-7-7" /></svg>
        </button>
      </div>

      <button id="btn-emergency-stop" class="emergency-stop">
        <span>STOP</span>
      </button>
    </section>

    <!-- ---------- AUTONOMOUS PANEL ---------- -->
    <section class="panel hidden" id="autonomous-panel">
      <h2 class="panel-title">Select Destination</h2>

      <div class="destination-grid" id="destination-grid">
        <button class="dest-card" data-destination="kitchen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 3v18M4 8h4M4 13h4M20 3v18M15 3v9a3 3 0 0 0 3 3M18 3v6" /></svg>
          <span>Kitchen</span>
        </button>
        <button class="dest-card" data-destination="living-room">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 18v-6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v6M4 18h16M4 18v2M20 18v2M6 10V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4" /></svg>
          <span>Living Room</span>
        </button>
        <button class="dest-card" data-destination="bedroom">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 18v-6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6M3 18h18M3 18v2M21 18v2M7 10V7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3" /></svg>
          <span>Bedroom</span>
        </button>
        <button class="dest-card" data-destination="bathroom">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 12h16v4a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-4ZM7 12V6a2 2 0 0 1 3.5-1.3M4 12V9a2 2 0 0 1 2-2h1" /></svg>
          <span>Bathroom</span>
        </button>
        <button class="dest-card" data-destination="study-room">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v13M4 19.5h15M4 19.5A2 2 0 0 0 6 21.5h11a2 2 0 0 0 2-2" /></svg>
          <span>Study Room</span>
        </button>
      </div>

      <button id="btn-start-route" class="start-route-btn" disabled>
        START ROUTE
      </button>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
